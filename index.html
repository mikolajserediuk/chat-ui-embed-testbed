<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>AI Chat Widget — Embed Testbed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
        body { margin: 0; padding: 24px; background: #f7f8fa; color: #1d1f22; box-sizing: border-box; }
        h1 { margin: 0 0 8px; font-size: 22px; }
        p.lead { margin: 0 0 24px; color: #5a6370; }
        p.lead code { background: #edf0f4; padding: 1px 6px; border-radius: 3px; font-size: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1100px; align-items: start; }
        .card { background: #fff; border: 1px solid #e3e6eb; border-radius: 8px; padding: 16px; min-width: 0; }
        .card h2 { margin: 0 0 12px; font-size: 16px; }
        .card.log-card { position: sticky; top: 24px; }
        label { display: block; margin: 10px 0 4px; font-size: 12px; color: #5a6370; }
        input[type="text"], textarea { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #d0d5dd; border-radius: 4px; font-family: monospace; font-size: 12px; }
        textarea { min-height: 64px; resize: vertical; }
        .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
        button { padding: 8px 14px; border: 1px solid #d0d5dd; background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
        button.primary { background: #0a66c2; color: #fff; border-color: #0a66c2; }
        button:hover { filter: brightness(0.96); }
        #log { height: min(60vh, 480px); overflow: auto; background: #0f1419; color: #d7e2ea; font-family: monospace; font-size: 12px; padding: 12px; border-radius: 4px; margin: 0; }
        #log .entry { padding: 2px 0; border-bottom: 1px solid #20282f; word-break: break-word; overflow-wrap: anywhere; white-space: pre-wrap; }
        #log .entry.event { color: #8dd7ff; }
        #log .entry.call { color: #fbe78a; }
        #log .entry.error { color: #ff7a7a; }
        @media (max-width: 760px) {
            .grid { grid-template-columns: 1fr; }
            .card.log-card { position: static; }
        }
    </style>
</head>
<body>
    <h1>AI Chat Widget — Embed Testbed</h1>
    <p class="lead">
        Host origin: <strong id="host-origin"></strong>. Paste a valid <code>JWT</code>, set <code>baseUrl</code> to the mercury-ui deployment you want to test against, and click <strong>init</strong>.
    </p>

    <div class="grid">
        <div class="card">
            <h2>Configuration</h2>
            <label for="base-url">baseUrl</label>
            <input type="text" id="base-url" value="https://dev.cobundu.com"/>

            <label for="jwt">jwt <em style="font-weight:normal;color:#7a8492">(never commit a real token)</em></label>
            <textarea id="jwt" placeholder="paste AI JWT (sub claim used as userId)"></textarea>

            <label for="product">product</label>
            <input type="text" id="product" value="SpacewellWorkplace"/>

            <label for="user-name">userName</label>
            <input type="text" id="user-name" placeholder="e.g. Mykola"/>

            <label for="chat-id">chatId <em style="font-weight:normal;color:#7a8492">(resume an existing conversation)</em></label>
            <input type="text" id="chat-id" placeholder="optional"/>

            <label>location <em style="font-weight:normal;color:#7a8492">(initial building scope)</em></label>
            <div class="row">
                <input type="text" id="location-id" style="flex:1;min-width:120px" placeholder="location.id (e.g. bldg-1)"/>
                <input type="text" id="location-label" style="flex:1;min-width:120px" placeholder="location.label (e.g. HQ)"/>
            </div>

            <label for="location-directory">locationDirectory <em style="font-weight:normal;color:#7a8492">(JSON: { "id": "label" })</em></label>
            <textarea id="location-directory" placeholder='{ "bldg-1": "HQ", "bldg-2": "Annex" }'></textarea>

            <label>theme / position / width / height / zIndex / allowFullscreen / showCloseButton</label>
            <div class="row">
                <select id="theme" style="max-width:90px">
                    <option value="light">light</option>
                    <option value="dark">dark</option>
                </select>
                <select id="position" style="max-width:90px" title="position">
                    <option value="br">br</option>
                    <option value="bl">bl</option>
                </select>
                <input type="text" id="width" value="600" style="max-width:80px" placeholder="width"/>
                <input type="text" id="height" value="800" style="max-width:80px" placeholder="height"/>
                <input type="text" id="z-index" value="2147483000" style="max-width:120px" placeholder="zIndex"/>
                <label style="display:inline-flex;align-items:center;gap:6px;margin:0;">
                    <input type="checkbox" id="allow-fullscreen" checked/> allowFullscreen
                </label>
                <label style="display:inline-flex;align-items:center;gap:6px;margin:0;">
                    <input type="checkbox" id="show-close-button" checked/> showCloseButton
                </label>
                <label style="display:inline-flex;align-items:center;gap:6px;margin:0;">
                    initialSidebarCollapsed
                    <select id="initial-sidebar-collapsed" style="max-width:140px" title="initialSidebarCollapsed">
                        <option value="">storage (default)</option>
                        <option value="true">true (collapsed)</option>
                        <option value="false">false (open)</option>
                    </select>
                </label>
                <label style="display:inline-flex;align-items:center;gap:6px;margin:0;">
                    <input type="checkbox" id="hide-sidebar-toggle"/> hideSidebarToggle
                </label>
            </div>

            <label>bubbleOffsetX / bubbleOffsetY / panelOffsetX / panelGap (px)</label>
            <div class="row">
                <input type="text" id="bubble-offset-x" value="24" style="max-width:80px" placeholder="bubbleX"/>
                <input type="text" id="bubble-offset-y" value="24" style="max-width:80px" placeholder="bubbleY"/>
                <input type="text" id="panel-offset-x" value="24" style="max-width:80px" placeholder="panelX"/>
                <input type="text" id="panel-gap" value="32" style="max-width:80px" placeholder="gap"/>
                <label style="display:inline-flex;align-items:center;gap:6px;margin:0;">
                    <input type="checkbox" id="bubble-icon-only" checked/> bubbleIconOnly
                </label>
            </div>

            <div class="row">
                <button class="primary" id="btn-init">init</button>
                <button id="btn-destroy">destroy</button>
                <button id="btn-open">open</button>
                <button id="btn-close">close</button>
                <button id="btn-toggle">toggle</button>
                <button id="btn-update-jwt">updateJwt (current)</button>
                <button id="btn-set-theme">setTheme (current)</button>
                <button id="btn-set-location">setLocation (current)</button>
                <button id="btn-clear-log">clear log</button>
            </div>
        </div>

        <div class="card log-card">
            <h2>Event log</h2>
            <div id="log"></div>
        </div>
    </div>

    <script>
        document.getElementById('host-origin').textContent = location.origin;

        const logEl = document.getElementById('log');
        function log(kind, text) {
            const el = document.createElement('div');
            el.className = 'entry ' + kind;
            el.textContent = '[' + new Date().toLocaleTimeString() + '] ' + text;
            logEl.insertBefore(el, logEl.firstChild);
        }

        function readLocation() {
            const id = document.getElementById('location-id').value.trim();
            if (!id) return undefined;
            const label = document.getElementById('location-label').value.trim();
            return label ? { id: id, label: label } : { id: id };
        }

        function readLocationDirectory() {
            const raw = document.getElementById('location-directory').value.trim();
            if (!raw) return undefined;
            try {
                const parsed = JSON.parse(raw);
                if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
                    log('error', 'locationDirectory must be a JSON object — ignoring');
                    return undefined;
                }
                const out = {};
                let dropped = 0;
                for (const k of Object.keys(parsed)) {
                    if (typeof parsed[k] === 'string') out[k] = parsed[k];
                    else dropped += 1;
                }
                if (dropped > 0) log('error', 'locationDirectory: dropped ' + dropped + ' non-string value(s)');
                return Object.keys(out).length > 0 ? out : undefined;
            } catch (e) {
                log('error', 'locationDirectory is not valid JSON — ignoring');
                return undefined;
            }
        }

        function readNumber(id) {
            const v = document.getElementById(id).value.trim();
            if (v === '') return undefined;
            const n = Number(v);
            return Number.isFinite(n) ? n : undefined;
        }

        function readConfig() {
            const jwt = document.getElementById('jwt').value.trim();
            const baseUrl = document.getElementById('base-url').value.trim();
            const product = document.getElementById('product').value.trim() || undefined;
            const userName = document.getElementById('user-name').value.trim() || undefined;
            const chatId = document.getElementById('chat-id').value.trim() || undefined;
            const location = readLocation();
            const locationDirectory = readLocationDirectory();
            const theme = document.getElementById('theme').value;
            const position = document.getElementById('position').value;
            const width = readNumber('width');
            const height = readNumber('height');
            const zIndex = readNumber('z-index');
            const allowFullscreen = document.getElementById('allow-fullscreen').checked;
            const showCloseButton = document.getElementById('show-close-button').checked;
            const initialSidebarRaw = document.getElementById('initial-sidebar-collapsed').value;
            const initialSidebarCollapsed = initialSidebarRaw === '' ? undefined : initialSidebarRaw === 'true';
            const hideSidebarToggle = document.getElementById('hide-sidebar-toggle').checked;
            const bubbleOffsetX = readNumber('bubble-offset-x');
            const bubbleOffsetY = readNumber('bubble-offset-y');
            const panelOffsetX = readNumber('panel-offset-x');
            const panelGap = readNumber('panel-gap');
            const bubbleIconOnly = document.getElementById('bubble-icon-only').checked;
            return { jwt, baseUrl, product, userName, chatId, location, locationDirectory, theme, position, width, height, zIndex, allowFullscreen, showCloseButton, initialSidebarCollapsed, hideSidebarToggle, bubbleOffsetX, bubbleOffsetY, panelOffsetX, panelGap, bubbleIconOnly };
        }

        function ensureScriptLoaded(baseUrl) {
            return new Promise((resolve, reject) => {
                if (window.MercuryChat) return resolve();
                const s = document.createElement('script');
                s.src = baseUrl.replace(/\/$/, '') + '/embed/chat/chat-widget.js';
                s.async = true;
                s.onload = () => { log('call', 'loader script loaded'); resolve(); };
                s.onerror = () => { log('error', 'loader script FAILED to load (check baseUrl + cert trust for localhost)'); reject(new Error('script load failed')); };
                document.head.appendChild(s);
            });
        }

        function wireEventListeners() {
            if (!window.MercuryChat) return;
            ['ready', 'error', 'open', 'close', 'expand', 'collapse', 'locationRequest'].forEach(function (evt) {
                MercuryChat.on(evt, function (payload) {
                    log('event', 'on(' + evt + ') ' + (payload ? JSON.stringify(payload) : ''));
                });
            });
            // Demo handler for locationRequest: prompt the host user, then push back via setLocation
            MercuryChat.on('locationRequest', function () {
                const id = window.prompt('locationRequest from chat — enter new building id (blank to cancel)');
                if (!id) return;
                const label = window.prompt('Optional label (blank to use id)') || undefined;
                log('call', 'setLocation(' + JSON.stringify({ id: id, label: label }) + ')');
                MercuryChat.setLocation({ id: id, label: label });
            });
        }

        document.getElementById('btn-init').addEventListener('click', async () => {
            try {
                const cfg = readConfig();
                if (!cfg.jwt) return log('error', 'JWT is empty — paste a valid token first');
                if (!cfg.baseUrl) return log('error', 'baseUrl is empty');
                log('call', 'init(' + JSON.stringify({ ...cfg, jwt: cfg.jwt.slice(0, 12) + '…' }) + ')');
                await ensureScriptLoaded(cfg.baseUrl);
                if (!window.MercuryChat) return log('error', 'window.MercuryChat missing after load');
                MercuryChat.init(cfg);
                wireEventListeners();
            } catch (e) { log('error', String(e)); }
        });

        document.getElementById('btn-destroy').addEventListener('click', () => {
            log('call', 'destroy()');
            if (window.MercuryChat) MercuryChat.destroy();
        });
        document.getElementById('btn-open').addEventListener('click', () => {
            log('call', 'open()');
            if (window.MercuryChat) MercuryChat.open();
        });
        document.getElementById('btn-close').addEventListener('click', () => {
            log('call', 'close()');
            if (window.MercuryChat) MercuryChat.close();
        });
        document.getElementById('btn-toggle').addEventListener('click', () => {
            log('call', 'toggle()');
            if (window.MercuryChat) MercuryChat.toggle();
        });
        document.getElementById('btn-update-jwt').addEventListener('click', () => {
            const token = document.getElementById('jwt').value.trim();
            if (!token) return log('error', 'JWT is empty');
            log('call', 'updateJwt(' + token.slice(0, 12) + '…)');
            if (window.MercuryChat) MercuryChat.updateJwt(token);
        });
        document.getElementById('btn-set-theme').addEventListener('click', () => {
            const theme = document.getElementById('theme').value;
            log('call', 'setTheme(' + theme + ')');
            if (window.MercuryChat) MercuryChat.setTheme(theme);
        });
        document.getElementById('btn-set-location').addEventListener('click', () => {
            const loc = readLocation();
            log('call', 'setLocation(' + JSON.stringify(loc ?? null) + ')');
            if (window.MercuryChat) MercuryChat.setLocation(loc ?? null);
        });
        document.getElementById('btn-clear-log').addEventListener('click', () => { logEl.innerHTML = ''; });

        log('call', 'ready; paste JWT and click init');
    </script>
</body>
</html>
